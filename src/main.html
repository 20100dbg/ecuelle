<script type="text/javascript">
const socket = io();
socket.on("connect", () => { console.log('connected'); });
socket.on("disconnect", () => { console.log('disconnected'); });

let info = {};
let idx_line = 0;
let results = {}

/*
function send_request() {
  socket.emit("call_server", { 'id': id, 'str': str });
}
*/

socket.on("receive_query", (params) => {

  console.log(params);

  if (params.info) {
    info = Object.assign(info, params.info);
    console.log(info);
  }

  if (params.query) {
    query = params.query;
    //nb_rows = params.nb_rows;
    status = params.error;

    addRowParams(params.timestamp, params.dbms, params.query, params.nb_rows, status)
  }

  if (params.rows) {
    results[idx_line] = params.rows;
  }  

  if (params.error) {

  }

});


function addRow(row) {
    table.row.add(row).draw(false);
}

function addRowParams(time, dbms, query, nb_rows, status, pretty_query, parameters) {

  const template = document.getElementById("tpl_actions");
  const clone = document.importNode(template.content, true);
  let buttons = clone.querySelectorAll("button");
  buttons[0].setAttribute("idx", idx_line);

  addRow([time, dbms, query, nb_rows, status, pretty_query, parameters]);

  idx_line++;
}

function show_result(button) {
  console.log(button);

  //idx = button.idx
  //console.log(results[idx]);
}

const table = new DataTable('#queries', {
    info: false,
    searching: false,
    ordering: true,
    paging: false,
    columnDefs: [
        {
            target: 4,
            visible: false
        },
        {
            target: 5,
            visible: false
        },
        {
            target: 6,
            visible: false
        }
    ]});
